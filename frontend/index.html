    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How is AlecRae different from Xero or QuickBooks?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AlecRae includes AI-powered autonomous bookkeeping, forensic fraud detection (Benford's Law, ghost vendor detection), native 4-country payroll, cross-border tax treaty calculations, and multi-jurisdiction compliance in one subscription. Competitors require 5-6 separate add-ons to match these capabilities."
          }
        },
        {
          "@type": "Question",
          "name": "What countries does AlecRae support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AlecRae supports Australia, New Zealand, United Kingdom, and United States in a single subscription. This includes jurisdiction-specific tax calculations (GST, VAT, Sales Tax), payroll (PAYG, PAYE, Federal withholding), and compliance calendars with 40+ deadlines."
          }
        },
        {
          "@type": "Question",
          "name": "Can I import data from Xero, QuickBooks, or MYOB?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AlecRae supports direct migration from Xero, QuickBooks Online, MYOB, Sage, FreshBooks, and CSV uploads. The import wizard maps your chart of accounts, contacts, invoices, bills, and bank transactions automatically."
          }
        },
        {
          "@type": "Question",
          "name": "How much does AlecRae cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AlecRae starts at $49/month for solo practitioners (5 clients, 1 jurisdiction). Practice plans are $149/month (50 clients), Firm plans are $499/month (unlimited clients, forensic intelligence), and Enterprise pricing is custom. Annual billing saves 2 months. Payroll is included in all plans — not an add-on."
          }
        },
        {
          "@type": "Question",
          "name": "Is AlecRae secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AlecRae uses AES-256 encryption at rest, TLS 1.3 in transit, role-based access control with 5 permission levels, immutable hash-chain audit trails, per-entity data isolation, and IP-based rate limiting. Bank credentials are handled by Plaid, Basiq, and TrueLayer — never stored on our servers."
          }
        }
      ]
    }
